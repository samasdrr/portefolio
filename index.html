<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samantha Asdrubal - Portfolio Business Analyst</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        @keyframes shootingStar {
            0% { transform: translateX(0) translateY(0); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translateX(1000px) translateY(500px); opacity: 0; }
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(20px, 30px) scale(1.05); }
        }
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.08); opacity: 1; }
        }
        @keyframes ringBlink {
            0%, 100% {
                box-shadow: 0 0 18px rgba(59,130,246,0.55), 0 0 32px rgba(168,85,247,0.45), 0 0 48px rgba(34,211,238,0.35);
                opacity: 0.9;
            }
            50% {
                box-shadow: 0 0 28px rgba(59,130,246,0.95), 0 0 56px rgba(168,85,247,0.75), 0 0 84px rgba(34,211,238,0.55);
                opacity: 1;
            }
        }
        .photo-universe { position: relative; width: 190px; height: 190px; margin: 0 auto 32px; }
        .photo-halo { position: absolute; inset: 0; border-radius: 50%; filter: blur(26px); animation: pulseGlow 4s ease-in-out infinite; }
        .halo-1 { background: radial-gradient(circle, rgba(59,130,246,0.55) 0%, rgba(59,130,246,0.08) 70%, transparent 100%); animation-delay: 0s; }
        .halo-2 { background: radial-gradient(circle, rgba(168,85,247,0.45) 0%, rgba(168,85,247,0.08) 70%, transparent 100%); animation-delay: 1.2s; transform: scale(1.08); }
        .halo-3 { background: radial-gradient(circle, rgba(34,211,238,0.35) 0%, rgba(34,211,238,0.05) 70%, transparent 100%); animation-delay: 2s; transform: scale(1.14); }
        .photo-ring { position: absolute; inset: 8px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.18); animation: ringBlink 2.6s ease-in-out infinite; pointer-events: none; }
        .photo-frame { position: absolute; inset: 16px; border-radius: 50%; overflow: hidden; border: 3px solid rgba(168,85,247,0.55); background: #050816; box-shadow: 0 0 0 2px rgba(59,130,246,0.22), 0 0 30px rgba(59,130,246,0.35), 0 0 50px rgba(168,85,247,0.25); }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.95) contrast(1.12) saturate(0.92) hue-rotate(8deg); transform: scale(1.06); }
        .photo-overlay { position: absolute; inset: 0; background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.14), transparent 28%), linear-gradient(135deg, rgba(37,99,235,0.18), rgba(168,85,247,0.16) 50%, rgba(34,211,238,0.10)); mix-blend-mode: screen; pointer-events: none; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow-x: hidden; background: #000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const RocketIcon = ({ className = "w-20 h-20" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        );
        const Code2Icon = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
            </svg>
        );
        const BriefcaseIcon = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
        );
        const GraduationCapIcon = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 14l9-5-9-5-9 5 9 5z" />
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
            </svg>
        );
        const MailIcon = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
        );
        const GithubIcon = ({ className }) => (
            <svg className={className} fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
        );
        const LinkedinIcon = ({ className }) => (
            <svg className={className} fill="currentColor" viewBox="0 0 24 24">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
        );
        const XIcon = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );
        const LanguagesIcon = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" />
            </svg>
        );

        function SpacePortfolio() {
            const [currentPlanet, setCurrentPlanet] = useState("home");
            const [isTransitioning, setIsTransitioning] = useState(false);
            const [language, setLanguage] = useState("fr");

            const navigateTo = (planet) => {
                setIsTransitioning(true);
                setTimeout(() => {
                    setCurrentPlanet(planet);
                    setIsTransitioning(false);
                }, 500);
            };

            const toggleLanguage = () => {
                setLanguage(prev => prev === "fr" ? "en" : "fr");
            };

            const t = {
                fr: {
                    title: "DATA",
                    subtitle: "UNIVERSE",
                    name: "Samantha Asdrubal",
                    role: "Business Analyst",
                    about: "À propos",
                    skills: "Compétences",
                    projects: "Projets",
                    contact: "Contact",
                    traveling: "Voyage en cours...",
                    aboutPlanet: "Planète À propos de moi",
                    aboutText1: "Bienvenue dans mon univers numérique ! Étudiante en Master Data & IA et alternante en tant que Business Analyst chez Mailinblack, une entreprise spécialisée en cybersécurité, je suis passionnée par la transformation des données en leviers de décision stratégiques.",
                    aboutText2: "Au fil de mes expériences, j'ai développé une expertise en création et optimisation de processus, ainsi qu'en conception de dashboards de reporting et d'analyse permettant de piloter efficacement l'activité et de faciliter la prise de décision.",
                    aboutText3: "Curieuse et orientée résultats, mon objectif est de transformer des données complexes en insights actionnables et de concevoir des visualisations claires, impactantes et utiles aux équipes métiers.",
                    skillsPlanet: "Planète Compétences",
                    analysis: "Data & Analyse",
                    analysisSkills: ["Python", "SQL", "Excel / Google Sheets"],
                    tools: "Visualisation & Reporting",
                    toolsSkills: ["Tableau", "Salesforce (dashboards & rapports)", "Notion (espaces & automatisation)"],
                    visualization: "Automatisation & Outils",
                    vizSkills: ["Make", "N8N", "Dust (création d'agents IA)", "Intégration d'API", "GitHub / VS Code"],
                    projectsPlanet: "Mes Projets",
                    projectsList: [
                        {
                            title: "Workflow SEO Ranking (Hackathon)",
                            desc: "Workflow N8N qui récupère une liste de mots-clés depuis Google Sheets et effectue un scoring basé sur le volume d'intentions de recherche de la veille.",
                            tags: ["Make", "N8N", "Google Sheets", "Hackathon"],
                            color: "purple"
                        },
                        {
                            title: "Prédiction Courses Hippiques",
                            desc: "Tableau de bord Google Sheets basé sur un dataset 2020. L'utilisateur indique les partants et reçoit une prédiction du top 3/5 via un scoring basé sur les performances passées.",
                            tags: ["Google Sheets", "Data Analysis", "Dashboard"],
                            color: "blue"
                        },
                        {
                            title: "Scraping Films & Séries",
                            desc: "Scraping de JustWatch pour créer un site de recommandation de films et séries personnalisé selon les goûts de l'utilisateur.",
                            tags: ["Python", "Scraping", "Web"],
                            color: "cyan"
                        },
                        {
                            title: "Chatbot Paroles de Musique",
                            desc: "Scraping de LyricsTranslate pour créer un chatbot aidant les utilisateurs à retrouver le titre d'une chanson à partir de ses paroles.",
                            tags: ["Python", "Scraping", "Chatbot"],
                            color: "pink"
                        },
                        {
                            title: "Hub Supply Marketplace (Hackathon Mirakl)",
                            desc: "Plateforme créée lors d'un hackathon avec Mirakl, permettant aux vendeurs d'un marketplace de gérer leur supply chain depuis un hub centralisé.",
                            tags: ["Hackathon", "Mirakl", "Supply Chain"],
                            color: "indigo"
                        }
                    ],
                    contactStation: "Station Contact",
                    contactText: "Envoyez-moi un signal spatial ! Vous avez un projet data en tête ? N'hésitez pas à me contacter.",
                    sendMessage: "Envoyer un message"
                },
                en: {
                    title: "DATA",
                    subtitle: "UNIVERSE",
                    name: "Samantha Asdrubal",
                    role: "Business Analyst",
                    about: "About",
                    skills: "Skills",
                    projects: "Projects",
                    contact: "Contact",
                    traveling: "Traveling...",
                    aboutPlanet: "About Me Planet",
                    aboutText1: "Welcome to my digital universe! A Master's student in Data & AI and apprentice Business Analyst at Mailinblack, a cybersecurity company, I am passionate about transforming data into strategic decision levers.",
                    aboutText2: "Through my experiences, I have developed expertise in process creation and optimization, as well as in designing reporting and analysis dashboards that effectively drive business activity and facilitate decision-making.",
                    aboutText3: "Curious and results-oriented, my goal is to transform complex data into actionable insights and design clear, impactful visualizations that are useful to business teams.",
                    skillsPlanet: "Skills Planet",
                    analysis: "Data & Analysis",
                    analysisSkills: ["Python", "SQL", "Excel / Google Sheets"],
                    tools: "Visualization & Reporting",
                    toolsSkills: ["Tableau", "Salesforce (dashboards & reports)", "Notion (spaces & automation)"],
                    visualization: "Automation & Tools",
                    vizSkills: ["Make", "N8N", "Dust (AI agent creation)", "API Integration", "GitHub / VS Code"],
                    projectsPlanet: "My Projects",
                    projectsList: [
                        {
                            title: "SEO Ranking Workflow (Hackathon)",
                            desc: "N8N workflow that retrieves a list of keywords from Google Sheets and scores them based on the previous day's search intent volume.",
                            tags: ["Make", "N8N", "Google Sheets", "Hackathon"],
                            color: "purple"
                        },
                        {
                            title: "Horse Racing Prediction",
                            desc: "Google Sheets dashboard based on a 2020 dataset. The user enters the competing horses and receives a top 3/5 prediction based on a pre-built scoring model.",
                            tags: ["Google Sheets", "Data Analysis", "Dashboard"],
                            color: "blue"
                        },
                        {
                            title: "Film & Series Scraping",
                            desc: "Scraping JustWatch to create a personalized movie and series recommendation site based on the user's tastes.",
                            tags: ["Python", "Scraping", "Web"],
                            color: "cyan"
                        },
                        {
                            title: "Lyrics Chatbot",
                            desc: "Scraping LyricsTranslate to create a chatbot helping users find a song title from its lyrics.",
                            tags: ["Python", "Scraping", "Chatbot"],
                            color: "pink"
                        },
                        {
                            title: "Marketplace Supply Hub (Mirakl Hackathon)",
                            desc: "Platform created during a hackathon with Mirakl, allowing marketplace sellers to manage their supply chain from a centralized hub.",
                            tags: ["Hackathon", "Mirakl", "Supply Chain"],
                            color: "indigo"
                        }
                    ],
                    contactStation: "Contact Station",
                    contactText: "Send me a space signal! Have a data project in mind? Feel free to contact me.",
                    sendMessage: "Send a message"
                }
            };

            const generateStars = (count, prefix) => {
                return [...Array(count)].map((_, i) => {
                    const size = Math.random() * 2 + 1;
                    return (
                        <div key={`${prefix}-${i}`} className="absolute bg-white rounded-full"
                            style={{
                                width: `${size}px`, height: `${size}px`,
                                top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`,
                                opacity: Math.random() * 0.8 + 0.2,
                                animation: `twinkle ${Math.random() * 3 + 2}s ease-in-out ${Math.random() * 5}s infinite`,
                            }}
                        />
                    );
                });
            };

            return (
                <div className="min-h-screen bg-black text-white overflow-hidden relative">
                    <div className="absolute inset-0">{generateStars(100, 's1')}</div>
                    <div className="absolute inset-0">
                        {[...Array(60)].map((_, i) => (
                            <div key={`s2-${i}`} className="absolute bg-blue-200 rounded-full"
                                style={{
                                    width: `${Math.random() * 3 + 2}px`, height: `${Math.random() * 3 + 2}px`,
                                    top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`,
                                    opacity: Math.random() * 0.6 + 0.3,
                                    animation: `twinkle ${Math.random() * 4 + 3}s ease-in-out ${Math.random() * 5}s infinite`,
                                    boxShadow: '0 0 4px rgba(147, 197, 253, 0.8)',
                                }}
                            />
                        ))}
                    </div>
                    <div className="absolute inset-0">
                        {[...Array(30)].map((_, i) => {
                            const colors = ['bg-cyan-300', 'bg-purple-300', 'bg-violet-300'];
                            const shadows = ['0 0 6px rgba(103,232,249,0.9)', '0 0 6px rgba(216,180,254,0.9)', '0 0 6px rgba(196,181,253,0.9)'];
                            const colorIndex = i % 3;
                            return (
                                <div key={`s3-${i}`} className={`absolute ${colors[colorIndex]} rounded-full`}
                                    style={{
                                        width: `${Math.random() * 4 + 3}px`, height: `${Math.random() * 4 + 3}px`,
                                        top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`,
                                        opacity: Math.random() * 0.7 + 0.3,
                                        animation: `twinkle ${Math.random() * 2 + 1}s ease-in-out ${Math.random() * 5}s infinite`,
                                        boxShadow: shadows[colorIndex],
                                    }}
                                />
                            );
                        })}
                    </div>
                    {[...Array(3)].map((_, i) => {
                        const trailColors = [
                            '0 0 10px 2px rgba(255,255,255,0.8), 0 0 20px 4px rgba(168,85,247,0.6)',
                            '0 0 10px 2px rgba(255,255,255,0.8), 0 0 20px 4px rgba(59,130,246,0.6)',
                            '0 0 10px 2px rgba(255,255,255,0.8), 0 0 20px 4px rgba(103,232,249,0.6)'
                        ];
                        return (
                            <div key={`shooting-${i}`} className="absolute w-1 h-1 bg-white rounded-full"
                                style={{
                                    top: `${Math.random() * 50}%`, left: '-10px',
                                    boxShadow: trailColors[i],
                                    animation: `shootingStar ${Math.random() * 3 + 4}s linear ${Math.random() * 10 + i * 8}s infinite`,
                                }}
                            />
                        );
                    })}
                    <div className="absolute top-20 right-20 w-96 h-96 bg-blue-600 rounded-full filter blur-3xl opacity-40" style={{ animation: 'drift 20s ease-in-out infinite' }}></div>
                    <div className="absolute bottom-20 left-20 w-96 h-96 bg-purple-500 rounded-full filter blur-3xl opacity-35" style={{ animation: 'drift 25s ease-in-out 2s infinite' }}></div>
                    <div className="absolute top-1/2 left-1/2 w-96 h-96 bg-violet-600 rounded-full filter blur-3xl opacity-25" style={{ animation: 'drift 30s ease-in-out 1s infinite' }}></div>
                    <div className="absolute top-40 left-60 w-64 h-64 bg-cyan-500 rounded-full filter blur-3xl opacity-30" style={{ animation: 'drift 22s ease-in-out 3s infinite' }}></div>
                    <div className="absolute bottom-40 right-40 w-80 h-80 bg-fuchsia-600 rounded-full filter blur-3xl opacity-25" style={{ animation: 'drift 28s ease-in-out 4s infinite' }}></div>

                    <button onClick={toggleLanguage} className="fixed top-8 right-8 z-50 group">
                        <div className="absolute inset-0 bg-purple-500 rounded-lg filter blur-lg opacity-0 group-hover:opacity-60 transition-all"></div>
                        <div className="relative px-5 py-2 bg-purple-500/20 backdrop-blur-md rounded-lg border-2 border-purple-400/50 hover:bg-purple-500/30 transition-all flex items-center gap-2" style={{ boxShadow: '0 0 30px rgba(168,85,247,0.5)' }}>
                            <LanguagesIcon className="w-5 h-5 text-purple-300" />
                            <span className="text-purple-300 font-bold text-lg">{language === "fr" ? "EN" : "FR"}</span>
                        </div>
                    </button>

                    {isTransitioning && (
                        <div className="fixed inset-0 bg-black z-50 flex items-center justify-center">
                            <RocketIcon className="w-24 h-24 text-blue-400 animate-pulse" />
                            <p className="text-2xl ml-4 text-blue-300 animate-pulse">{t[language].traveling}</p>
                        </div>
                    )}

                    <div className="relative z-10">
                        {currentPlanet === "home" && <HomePage navigateTo={navigateTo} t={t[language]} />}
                        {currentPlanet === "about" && <AboutPage navigateTo={navigateTo} t={t[language]} />}
                        {currentPlanet === "skills" && <SkillsPage navigateTo={navigateTo} t={t[language]} />}
                        {currentPlanet === "projects" && <ProjectsPage navigateTo={navigateTo} t={t[language]} />}
                        {currentPlanet === "contact" && <ContactPage navigateTo={navigateTo} t={t[language]} />}
                    </div>
                </div>
            );
        }

        function HomePage({ navigateTo, t }) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <div className="photo-universe">
                        <div className="photo-halo halo-1"></div>
                        <div className="photo-halo halo-2"></div>
                        <div className="photo-halo halo-3"></div>
                        <div className="photo-ring"></div>
                        <div className="photo-frame">
                            <img src="https://raw.githubusercontent.com/samasdrr/portefolio/main/photo.png.png" alt="Samantha Asdrubal" />
                            <div className="photo-overlay"></div>
                        </div>
                    </div>

                    <h1 className="text-6xl md:text-8xl font-bold mb-6 text-center" style={{ textShadow: '0 0 40px rgba(168,85,247,0.8)' }}>
                        {t.title}
                        <span className="block text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-blue-400 to-cyan-400 mt-2" style={{ textShadow: '0 0 60px rgba(168,85,247,1)' }}>{t.subtitle}</span>
                    </h1>

                    <p className="text-2xl text-slate-300 mb-4">{t.name}</p>
                    <p className="text-xl text-transparent bg-clip-text bg-gradient-to-r from-purple-300 to-cyan-300 mb-12">{t.role}</p>

                    <div className="flex flex-wrap items-center justify-center gap-12 max-w-6xl w-full px-4">
                        {[
                            { label: t.about, planet: "about", icon: <Code2Icon className="w-8 h-8" />, color: 'purple' },
                            { label: t.skills, planet: "skills", icon: <BriefcaseIcon className="w-9 h-9" />, color: 'yellow' },
                            { label: t.projects, planet: "projects", icon: <GraduationCapIcon className="w-7 h-7" />, color: 'blue' },
                            { label: t.contact, planet: "contact", icon: <MailIcon className="w-8 h-8" />, color: 'pink' }
                        ].map((item, i) => (
                            <button key={i} onClick={() => navigateTo(item.planet)} className="flex flex-col items-center cursor-pointer group">
                                <div className="relative w-40 h-40 mb-4 group-hover:scale-110 transition-all duration-300">
                                    <div className={`absolute inset-0 bg-${item.color}-500 rounded-full filter blur-3xl opacity-60 animate-pulse`} style={{ animationDuration: '3s' }}></div>
                                    <div className={`relative w-full h-full bg-gradient-to-br from-${item.color}-500 to-${item.color}-700 rounded-full flex items-center justify-center text-white border-2 border-${item.color}-300/40`} style={{ boxShadow: '0 0 50px rgba(168,85,247,0.8)' }}>
                                        {item.icon}
                                    </div>
                                </div>
                                <span className="text-lg font-bold text-slate-200 group-hover:text-white transition-colors">{item.label}</span>
                            </button>
                        ))}
                    </div>

                    <div className="flex gap-4 mt-12">
                        <SocialLink href="https://github.com/samasdrr" icon={<GithubIcon className="w-6 h-6" />} />
                        <SocialLink href="https://linkedin.com" icon={<LinkedinIcon className="w-6 h-6" />} />
                        <SocialLink href="mailto:sasdrubal@eugeniaschool.com" icon={<MailIcon className="w-6 h-6" />} />
                    </div>
                </div>
            );
        }

        function AboutPage({ navigateTo, t }) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <BackButton onClick={() => navigateTo("home")} />
                    <div className="relative max-w-4xl w-full">
                        <div className="absolute inset-0 bg-purple-500 rounded-full filter blur-3xl opacity-60" style={{ animation: 'drift 20s ease-in-out infinite' }}></div>
                        <h2 className="text-5xl font-bold mb-12 text-center" style={{ textShadow: '0 0 30px rgba(168,85,247,0.8)' }}>{t.aboutPlanet}</h2>
                        <div className="relative bg-gradient-to-br from-purple-500/20 to-blue-500/20 backdrop-blur-md border-2 border-purple-400/50 rounded-xl p-12" style={{ boxShadow: '0 0 60px rgba(168,85,247,0.6)' }}>
                            <div className="flex items-center justify-center mb-8">
                                <div className="relative w-24 h-24 bg-gradient-to-br from-purple-500 to-purple-700 rounded-full flex items-center justify-center text-4xl font-bold border-2 border-purple-400/60" style={{ boxShadow: '0 0 40px rgba(168,85,247,0.8)' }}>
                                    SA
                                </div>
                            </div>
                            <p className="text-xl text-slate-100 text-center mb-6 leading-relaxed">{t.aboutText1}</p>
                            <p className="text-lg text-slate-200 text-center mb-4 leading-relaxed">{t.aboutText2}</p>
                            <p className="text-lg text-slate-200 text-center leading-relaxed">{t.aboutText3}</p>
                        </div>
                    </div>
                </div>
            );
        }

        function SkillsPage({ navigateTo, t }) {
            const skills = [
                { title: t.analysis, list: t.analysisSkills, color: "purple", icon: <Code2Icon className="w-12 h-12" /> },
                { title: t.tools, list: t.toolsSkills, color: "blue", icon: <BriefcaseIcon className="w-12 h-12" /> },
                { title: t.visualization, list: t.vizSkills, color: "cyan", icon: <GraduationCapIcon className="w-12 h-12" /> }
            ];
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <BackButton onClick={() => navigateTo("home")} />
                    <h2 className="text-5xl font-bold mb-12 text-center" style={{ textShadow: '0 0 30px rgba(251,191,36,0.8)' }}>{t.skillsPlanet}</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl w-full">
                        {skills.map((skill, i) => (
                            <div key={i} className="relative group">
                                <div className={`absolute inset-0 bg-${skill.color}-500 rounded-xl filter blur-2xl opacity-50 group-hover:opacity-70 transition-all`}></div>
                                <div className={`relative bg-${skill.color}-500/20 border-2 border-${skill.color}-400/50 rounded-xl p-8 hover:scale-105 transition-all`}>
                                    <div className="mb-4 text-white">{skill.icon}</div>
                                    <h3 className={`text-2xl font-bold mb-4 text-${skill.color}-200`}>{skill.title}</h3>
                                    <ul className="space-y-2 text-slate-200">
                                        {skill.list.map((item, j) => <li key={j}>• {item}</li>)}
                                    </ul>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ProjectsPage({ navigateTo, t }) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <BackButton onClick={() => navigateTo("home")} />
                    <h2 className="text-5xl font-bold mb-12 text-center" style={{ textShadow: '0 0 30px rgba(59,130,246,0.8)' }}>{t.projectsPlanet}</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl w-full">
                        {t.projectsList.map((project, i) => (
                            <ProjectCard key={i} title={project.title} desc={project.desc} tags={project.tags} color={project.color} />
                        ))}
                    </div>
                </div>
            );
        }

        function ProjectCard({ title, desc, tags, color }) {
            return (
                <div className="relative group">
                    <div className={`absolute inset-0 bg-${color}-500 rounded-xl filter blur-2xl opacity-40 group-hover:opacity-60 transition-all`}></div>
                    <div className={`relative bg-${color}-500/20 border-2 border-${color}-400/40 rounded-xl p-8 hover:scale-105 transition-all`}>
                        <div className={`w-full h-40 bg-gradient-to-br from-${color}-500 to-${color}-700 rounded-lg flex items-center justify-center mb-6 border-2 border-${color}-300/40`}>
                            <RocketIcon className="w-16 h-16 text-white" />
                        </div>
                        <h3 className={`text-xl font-bold mb-3 text-${color}-200`}>{title}</h3>
                        <p className="text-slate-100 mb-4 text-sm leading-relaxed">{desc}</p>
                        <div className="flex gap-2 flex-wrap">
                            {tags.map((tag, i) => (
                                <span key={i} className={`px-3 py-1 bg-${color}-500/30 rounded-full text-xs border border-${color}-400/40 text-${color}-200`}>{tag}</span>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function ContactPage({ navigateTo, t }) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <BackButton onClick={() => navigateTo("home")} />
                    <h2 className="text-5xl font-bold mb-12 text-center" style={{ textShadow: '0 0 30px rgba(244,114,182,0.8)' }}>{t.contactStation}</h2>
                    <div className="relative max-w-2xl w-full">
                        <div className="absolute inset-0 bg-pink-500 rounded-xl filter blur-3xl opacity-50"></div>
                        <div className="relative bg-gradient-to-br from-pink-500/20 to-purple-500/20 backdrop-blur-md border-2 border-pink-400/50 rounded-xl p-12 text-center" style={{ boxShadow: '0 0 70px rgba(244,114,182,0.6)' }}>
                            <div className="relative inline-block mb-8">
                                <div className="absolute inset-0 bg-pink-500 rounded-full filter blur-2xl opacity-70"></div>
                                <MailIcon className="relative w-20 h-20 text-pink-300 mx-auto" style={{ filter: 'drop-shadow(0 0 20px rgba(244,114,182,0.9))' }} />
                            </div>
                            <p className="text-xl text-slate-100 mb-8">{t.contactText}</p>
                            <div className="relative inline-block mb-8">
                                <div className="absolute inset-0 bg-gradient-to-r from-pink-500 to-purple-500 rounded-lg filter blur-xl opacity-70"></div>
                                <a href="mailto:sasdrubal@eugeniaschool.com" className="relative inline-block px-8 py-4 bg-gradient-to-r from-pink-500 to-purple-500 rounded-lg font-semibold text-lg border-2 border-pink-300/50 hover:scale-105 transition-all" style={{ boxShadow: '0 0 40px rgba(244,114,182,0.8)' }}>
                                    {t.sendMessage}
                                </a>
                            </div>
                            <div className="flex gap-4 justify-center">
                                <a href="https://github.com/samasdrr" target="_blank" className="p-3 bg-pink-500/20 rounded-lg border border-pink-400/40 hover:bg-pink-500/30 transition-all">
                                    <GithubIcon className="w-6 h-6" />
                                </a>
                                <a href="https://linkedin.com" target="_blank" className="p-3 bg-pink-500/20 rounded-lg border border-pink-400/40 hover:bg-pink-500/30 transition-all">
                                    <LinkedinIcon className="w-6 h-6" />
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function BackButton({ onClick }) {
            return (
                <button onClick={onClick} className="fixed top-8 left-8 z-50 group">
                    <div className="absolute inset-0 bg-blue-500 rounded-full filter blur-lg opacity-0 group-hover:opacity-60 transition-all"></div>
                    <div className="relative p-4 bg-blue-500/20 backdrop-blur-md rounded-full border-2 border-blue-400/50 hover:bg-blue-500/30 transition-all" style={{ boxShadow: '0 0 30px rgba(59,130,246,0.5)' }}>
                        <XIcon className="w-6 h-6 text-blue-300" />
                    </div>
                </button>
            );
        }

        function SocialLink({ href, icon }) {
            return (
                <a href={href} target="_blank" rel="noopener noreferrer" className="relative p-3 bg-blue-500/10 backdrop-blur-sm rounded-lg border border-blue-500/30 hover:bg-blue-500/20 transition-all group">
                    <div className="absolute inset-0 bg-blue-500 rounded-lg filter blur-md opacity-0 group-hover:opacity-40 transition-opacity"></div>
                    <div className="relative text-blue-300">{icon}</div>
                </a>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SpacePortfolio />);
    </script>
</body>
</html>
