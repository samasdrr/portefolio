<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samantha Asdrubal - Portfolio Data Analyst</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        @keyframes shootingStar {
            0% { 
                transform: translateX(0) translateY(0); 
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% { 
                transform: translateX(1000px) translateY(500px); 
                opacity: 0;
            }
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(20px, 30px) scale(1.05); }
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Icônes SVG
        const RocketIcon = ({ className = "w-20 h-20" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        );

        const Code2Icon = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
            </svg>
        );

        const BriefcaseIcon = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
        );

        const GraduationCapIcon = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 14l9-5-9-5-9 5 9 5z" />
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
            </svg>
        );

        const MailIcon = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
        );

        const GithubIcon = ({ className }) => (
            <svg className={className} fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
        );

        const LinkedinIcon = ({ className }) => (
            <svg className={className} fill="currentColor" viewBox="0 0 24 24">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
        );

        const XIcon = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        const LanguagesIcon = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" />
            </svg>
        );

        function SpacePortfolio() {
            const [currentPlanet, setCurrentPlanet] = useState("home");
            const [isTransitioning, setIsTransitioning] = useState(false);
            const [language, setLanguage] = useState("fr");

            const navigateTo = (planet) => {
                setIsTransitioning(true);
                setTimeout(() => {
                    setCurrentPlanet(planet);
                    setIsTransitioning(false);
                }, 500);
            };

            const toggleLanguage = () => {
                setLanguage(prev => prev === "fr" ? "en" : "fr");
            };

            const t = {
                fr: {
                    title: "MON",
                    subtitle: "UNIVERS",
                    name: "Samantha Asdrubal",
                    role: "Analyste de Données",
                    about: "À propos",
                    skills: "Compétences",
                    projects: "Projets",
                    contact: "Contact",
                    traveling: "Voyage en cours...",
                    aboutPlanet: "Planète À propos",
                    aboutText1: "Bienvenue dans mon univers numérique ! Je suis une analyste de données passionnée par la transformation de données complexes en insights actionnables.",
                    aboutText2: "Avec une expertise en analyse statistique, visualisation de données et machine learning, je transforme des données brutes en décisions stratégiques. Mon objectif est de révéler les histoires cachées dans les données et de créer des visualisations qui parlent.",
                    skillsPlanet: "Planète Compétences",
                    analysis: "Analyse",
                    analysisSkills: ["Python & R", "SQL & Bases de données", "Machine Learning", "Statistiques"],
                    tools: "Outils",
                    toolsSkills: ["Tableau & Power BI", "Excel avancé", "Jupyter & VS Code", "Git & GitHub"],
                    visualization: "Visualisation",
                    vizSkills: ["Data Viz", "Dashboards", "Storytelling", "Design de rapports"],
                    projectsPlanet: "Planète Projets",
                    project1Title: "Analyse Prédictive",
                    project1Desc: "Modèle de machine learning pour prédire le comportement client avec une précision de 92%, permettant d'optimiser les stratégies marketing.",
                    project1Tags: ["Python", "ML", "Pandas"],
                    project2Title: "Dashboard Interactif",
                    project2Desc: "Tableau de bord dynamique en temps réel pour visualiser les KPIs business et faciliter la prise de décision data-driven.",
                    project2Tags: ["Tableau", "SQL", "Analytics"],
                    contactStation: "Station Contact",
                    contactText: "Envoyez-moi un signal spatial ! Vous avez un projet data en tête ? N'hésitez pas à me contacter.",
                    sendMessage: "Envoyer un message"
                },
                en: {
                    title: "MY",
                    subtitle: "UNIVERSE",
                    name: "Samantha Asdrubal",
                    role: "Data Analyst",
                    about: "About",
                    skills: "Skills",
                    projects: "Projects",
                    contact: "Contact",
                    traveling: "Traveling...",
                    aboutPlanet: "About Planet",
                    aboutText1: "Welcome to my digital universe! I'm a data analyst passionate about transforming complex data into actionable insights.",
                    aboutText2: "With expertise in statistical analysis, data visualization, and machine learning, I transform raw data into strategic decisions. My goal is to reveal hidden stories in data and create visualizations that speak volumes.",
                    skillsPlanet: "Skills Planet",
                    analysis: "Analysis",
                    analysisSkills: ["Python & R", "SQL & Databases", "Machine Learning", "Statistics"],
                    tools: "Tools",
                    toolsSkills: ["Tableau & Power BI", "Advanced Excel", "Jupyter & VS Code", "Git & GitHub"],
                    visualization: "Visualization",
                    vizSkills: ["Data Viz", "Dashboards", "Storytelling", "Report Design"],
                    projectsPlanet: "Projects Planet",
                    project1Title: "Predictive Analysis",
                    project1Desc: "Machine learning model to predict customer behavior with 92% accuracy, enabling optimized marketing strategies.",
                    project1Tags: ["Python", "ML", "Pandas"],
                    project2Title: "Interactive Dashboard",
                    project2Desc: "Real-time dynamic dashboard to visualize business KPIs and facilitate data-driven decision making.",
                    project2Tags: ["Tableau", "SQL", "Analytics"],
                    contactStation: "Contact Station",
                    contactText: "Send me a space signal! Have a data project in mind? Feel free to contact me.",
                    sendMessage: "Send a message"
                }
            };

            const generateStars = (count, prefix) => {
                return [...Array(count)].map((_, i) => {
                    const size = Math.random() * 2 + 1;
                    return (
                        <div
                            key={`${prefix}-${i}`}
                            className="absolute bg-white rounded-full"
                            style={{
                                width: `${size}px`,
                                height: `${size}px`,
                                top: `${Math.random() * 100}%`,
                                left: `${Math.random() * 100}%`,
                                opacity: Math.random() * 0.8 + 0.2,
                                animation: `twinkle ${Math.random() * 3 + 2}s ease-in-out ${Math.random() * 5}s infinite`,
                            }}
                        />
                    );
                });
            };

            return (
                <div className="min-h-screen bg-black text-white overflow-hidden relative">
                    {/* Étoiles */}
                    <div className="absolute inset-0">{generateStars(100, 's1')}</div>
                    <div className="absolute inset-0">
                        {[...Array(60)].map((_, i) => (
                            <div
                                key={`s2-${i}`}
                                className="absolute bg-blue-200 rounded-full"
                                style={{
                                    width: `${Math.random() * 3 + 2}px`,
                                    height: `${Math.random() * 3 + 2}px`,
                                    top: `${Math.random() * 100}%`,
                                    left: `${Math.random() * 100}%`,
                                    opacity: Math.random() * 0.6 + 0.3,
                                    animation: `twinkle ${Math.random() * 4 + 3}s ease-in-out ${Math.random() * 5}s infinite`,
                                    boxShadow: '0 0 4px rgba(147, 197, 253, 0.8)',
                                }}
                            />
                        ))}
                    </div>

                    {/* Nébuleuses */}
                    <div className="absolute top-20 right-20 w-96 h-96 bg-blue-600 rounded-full filter blur-3xl opacity-40" style={{ animation: 'drift 20s ease-in-out infinite' }}></div>
                    <div className="absolute bottom-20 left-20 w-96 h-96 bg-purple-500 rounded-full filter blur-3xl opacity-35" style={{ animation: 'drift 25s ease-in-out 2s infinite' }}></div>
                    <div className="absolute top-1/2 left-1/2 w-96 h-96 bg-violet-600 rounded-full filter blur-3xl opacity-25" style={{ animation: 'drift 30s ease-in-out 1s infinite' }}></div>

                    {/* Bouton langue */}
                    <button onClick={toggleLanguage} className="fixed top-8 right-8 z-50 group">
                        <div className="absolute inset-0 bg-purple-500 rounded-lg filter blur-lg opacity-0 group-hover:opacity-60 transition-all"></div>
                        <div className="relative px-5 py-2 bg-purple-500/20 backdrop-blur-md rounded-lg border-2 border-purple-400/50 hover:bg-purple-500/30 transition-all flex items-center gap-2" style={{ boxShadow: '0 0 30px rgba(168, 85, 247, 0.5)' }}>
                            <LanguagesIcon className="w-5 h-5 text-purple-300" />
                            <span className="text-purple-300 font-bold text-lg">{language === "fr" ? "EN" : "FR"}</span>
                        </div>
                    </button>

                    {/* Transition */}
                    {isTransitioning && (
                        <div className="fixed inset-0 bg-black z-50 flex items-center justify-center animate-pulse">
                            <RocketIcon className="w-24 h-24 text-blue-400 animate-pulse" />
                            <p className="text-2xl ml-4 text-blue-300">{t[language].traveling}</p>
                        </div>
                    )}

                    {/* Contenu */}
                    <div className="relative z-10">
                        {currentPlanet === "home" && <HomePage navigateTo={navigateTo} t={t[language]} />}
                        {currentPlanet === "about" && <AboutPage navigateTo={navigateTo} t={t[language]} />}
                        {currentPlanet === "skills" && <SkillsPage navigateTo={navigateTo} t={t[language]} />}
                        {currentPlanet === "projects" && <ProjectsPage navigateTo={navigateTo} t={t[language]} />}
                        {currentPlanet === "contact" && <ContactPage navigateTo={navigateTo} t={t[language]} />}
                    </div>
                </div>
            );
        }

        function HomePage({ navigateTo, t }) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    {/* Avatar - REMPLACEZ ICI PAR VOTRE PHOTO */}
                    <div className="relative mb-12 animate-pulse">
                        <div className="absolute inset-0 bg-blue-500 rounded-full filter blur-3xl opacity-70" style={{ width: '160px', height: '160px' }}></div>
                        <div className="absolute inset-0 bg-purple-500 rounded-full filter blur-2xl opacity-50" style={{ width: '160px', height: '160px' }}></div>
                        <div className="relative w-40 h-40 bg-gradient-to-br from-blue-500 via-purple-600 to-blue-700 rounded-full flex items-center justify-center border-4 border-purple-400/60 overflow-hidden" style={{ boxShadow: '0 0 80px rgba(168, 85, 247, 0.9)' }}>
                            {/* OPTION 1: Initiales (par défaut) */}
                            <span className="text-7xl font-bold">SA</span>
                            
                            {/* OPTION 2: Remplacez la ligne ci-dessus par celle-ci pour votre photo : */}
                            {/* <img src="photo.jpg" alt="Samantha" className="w-full h-full object-cover" /> */}
                        </div>
                    </div>

                    <h1 className="text-6xl md:text-8xl font-bold mb-6 text-center" style={{ textShadow: '0 0 40px rgba(168, 85, 247, 0.8)' }}>
                        {t.title}
                        <span className="block text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-blue-400 to-cyan-400 mt-2">{t.subtitle}</span>
                    </h1>

                    <p className="text-2xl text-slate-300 mb-4">{t.name}</p>
                    <p className="text-xl text-transparent bg-clip-text bg-gradient-to-r from-purple-300 to-cyan-300 mb-12">{t.role}</p>

                    {/* Navigation vers planètes - version simplifiée pour le HTML */}
                    <div className="flex flex-wrap items-center justify-center gap-12 max-w-6xl w-full px-4">
                        {[
                            { label: t.about, planet: "about", icon: <Code2Icon className="w-8 h-8" /> },
                            { label: t.skills, planet: "skills", icon: <BriefcaseIcon className="w-9 h-9" /> },
                            { label: t.projects, planet: "projects", icon: <GraduationCapIcon className="w-7 h-7" /> },
                            { label: t.contact, planet: "contact", icon: <MailIcon className="w-8 h-8" /> }
                        ].map((item, i) => (
                            <button key={i} onClick={() => navigateTo(item.planet)} className="flex flex-col items-center cursor-pointer group">
                                <div className="relative w-40 h-40 mb-4 group-hover:scale-110 transition-all">
                                    <div className="absolute inset-0 bg-purple-500 rounded-full filter blur-3xl opacity-60 animate-pulse"></div>
                                    <div className="relative w-full h-full bg-gradient-to-br from-purple-500 to-purple-700 rounded-full flex items-center justify-center text-white border-2 border-purple-300/40" style={{ boxShadow: '0 0 50px rgba(168, 85, 247, 0.8)' }}>
                                        {item.icon}
                                    </div>
                                </div>
                                <span className="text-lg font-bold text-slate-200 group-hover:text-white">{item.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Liens sociaux */}
                    <div className="flex gap-4 mt-12">
                        <SocialLink href="https://github.com" icon={<GithubIcon className="w-6 h-6" />} />
                        <SocialLink href="https://linkedin.com" icon={<LinkedinIcon className="w-6 h-6" />} />
                        <SocialLink href="mailto:sasdrubal@eugeniaschool.com" icon={<MailIcon className="w-6 h-6" />} />
                    </div>
                </div>
            );
        }

        function AboutPage({ navigateTo, t }) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <BackButton onClick={() => navigateTo("home")} />
                    <h2 className="text-5xl font-bold mb-12 text-center" style={{ textShadow: '0 0 30px rgba(168, 85, 247, 0.8)' }}>{t.aboutPlanet}</h2>
                    <div className="max-w-4xl bg-gradient-to-br from-purple-500/20 to-blue-500/20 backdrop-blur-md border-2 border-purple-400/50 rounded-xl p-12" style={{ boxShadow: '0 0 60px rgba(168, 85, 247, 0.6)' }}>
                        <p className="text-xl text-slate-100 text-center mb-6">{t.aboutText1}</p>
                        <p className="text-lg text-slate-200 text-center">{t.aboutText2}</p>
                    </div>
                </div>
            );
        }

        function SkillsPage({ navigateTo, t }) {
            const skills = [
                { title: t.analysis, list: t.analysisSkills, color: "purple" },
                { title: t.tools, list: t.toolsSkills, color: "blue" },
                { title: t.visualization, list: t.vizSkills, color: "cyan" }
            ];

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <BackButton onClick={() => navigateTo("home")} />
                    <h2 className="text-5xl font-bold mb-12 text-center">{t.skillsPlanet}</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl">
                        {skills.map((skill, i) => (
                            <div key={i} className={`bg-${skill.color}-500/20 border-2 border-${skill.color}-400/50 rounded-xl p-8`}>
                                <h3 className="text-2xl font-bold mb-4">{skill.title}</h3>
                                <ul className="space-y-2">
                                    {skill.list.map((item, j) => <li key={j}>• {item}</li>)}
                                </ul>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ProjectsPage({ navigateTo, t }) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <BackButton onClick={() => navigateTo("home")} />
                    <h2 className="text-5xl font-bold mb-12 text-center">{t.projectsPlanet}</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-6xl">
                        <ProjectCard title={t.project1Title} desc={t.project1Desc} tags={t.project1Tags} />
                        <ProjectCard title={t.project2Title} desc={t.project2Desc} tags={t.project2Tags} />
                    </div>
                </div>
            );
        }

        function ProjectCard({ title, desc, tags }) {
            return (
                <div className="bg-purple-500/20 border-2 border-purple-400/40 rounded-xl p-8">
                    <div className="w-full h-48 bg-gradient-to-br from-purple-500 to-purple-700 rounded-lg flex items-center justify-center mb-6">
                        <RocketIcon className="w-16 h-16" />
                    </div>
                    <h3 className="text-2xl font-bold mb-3">{title}</h3>
                    <p className="text-slate-100 mb-4">{desc}</p>
                    <div className="flex gap-2 flex-wrap">
                        {tags.map((tag, i) => (
                            <span key={i} className="px-3 py-1 bg-purple-500/30 rounded-full text-sm border border-purple-400/40">{tag}</span>
                        ))}
                    </div>
                </div>
            );
        }

        function ContactPage({ navigateTo, t }) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <BackButton onClick={() => navigateTo("home")} />
                    <h2 className="text-5xl font-bold mb-12 text-center">{t.contactStation}</h2>
                    <div className="max-w-2xl bg-gradient-to-br from-pink-500/20 to-purple-500/20 backdrop-blur-md border-2 border-pink-400/50 rounded-xl p-12 text-center">
                        <MailIcon className="w-20 h-20 text-pink-300 mx-auto mb-8" />
                        <p className="text-xl mb-8">{t.contactText}</p>
                        <a href="mailto:sasdrubal@eugeniaschool.com" className="inline-block px-8 py-4 bg-gradient-to-r from-pink-500 to-purple-500 rounded-lg font-semibold text-lg hover:scale-105 transition-all">
                            {t.sendMessage}
                        </a>
                        <div className="flex gap-4 justify-center mt-8">
                            <a href="https://github.com" target="_blank" className="p-3 bg-pink-500/20 rounded-lg"><GithubIcon className="w-6 h-6" /></a>
                            <a href="https://linkedin.com" target="_blank" className="p-3 bg-pink-500/20 rounded-lg"><LinkedinIcon className="w-6 h-6" /></a>
                        </div>
                    </div>
                </div>
            );
        }

        function BackButton({ onClick }) {
            return (
                <button onClick={onClick} className="fixed top-8 left-8 z-50 p-4 bg-blue-500/20 backdrop-blur-md rounded-full border-2 border-blue-400/50 hover:bg-blue-500/30">
                    <XIcon className="w-6 h-6 text-blue-300" />
                </button>
            );
        }

        function SocialLink({ href, icon }) {
            return (
                <a href={href} target="_blank" className="p-3 bg-blue-500/10 rounded-lg border border-blue-500/30 hover:bg-blue-500/20 transition-all">
                    {icon}
                </a>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SpacePortfolio />);
    </script>
</body>
</html>
